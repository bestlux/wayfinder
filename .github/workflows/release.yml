name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  package:
    name: Package Foundry module
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Check out repository
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive release version
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate
        run: npm run check

      - name: Build release package
        run: node tools/release/prepare-package.mjs --version "${{ steps.release.outputs.version }}" --tag "${{ steps.release.outputs.tag }}" --repo "${{ github.repository }}"

      - name: Upload release package
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: foundry-release-package
          if-no-files-found: error
          path: |
            dist/release/module.json
            dist/release/module.zip
            dist/release/package-manifest.json

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write

    steps:
      - name: Download release package
        # actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: foundry-release-package
          path: dist/release

      - name: Publish GitHub release assets
        # softprops/action-gh-release@v3
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: |
            dist/release/module.json
            dist/release/module.zip
            dist/release/package-manifest.json
          prerelease: ${{ contains(needs.package.outputs.version, '-') }}
