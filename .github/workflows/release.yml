name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  package:
    name: Package Foundry module
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Check out repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Set up Node.js
        # actions/setup-node@v5
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive release version
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate
        run: npm run check

      - name: Build release package
        run: node tools/release/prepare-package.mjs --version "${{ steps.release.outputs.version }}" --tag "${{ steps.release.outputs.tag }}" --repo "${{ github.repository }}"

      - name: Upload release package
        # actions/upload-artifact@v5
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: foundry-release-package
          if-no-files-found: error
          path: |
            dist/release/module.json
            dist/release/module.zip
            dist/release/package-manifest.json

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write

    steps:
      - name: Download release package
        # actions/download-artifact@v5
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: foundry-release-package
          path: dist/release

      - name: Publish GitHub release assets
        # softprops/action-gh-release@v3
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: |
            dist/release/module.json
            dist/release/module.zip
            dist/release/package-manifest.json
          prerelease: ${{ contains(needs.package.outputs.version, '-') }}
