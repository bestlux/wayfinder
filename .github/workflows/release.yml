name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  package:
    name: Package Foundry module
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Check out repository
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Node.js
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive release version
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate
        run: npm run check

      - name: Build release package
        run: node tools/release/prepare-package.mjs --version "${{ steps.release.outputs.version }}" --tag "${{ steps.release.outputs.tag }}" --repo "${{ github.repository }}"

      - name: Upload release package
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: foundry-release-package
          if-no-files-found: error
          path: |
            dist/release/module.json
            dist/release/module.zip
            dist/release/package-manifest.json

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write

    steps:
      - name: Download release package
        # actions/download-artifact@v4
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: foundry-release-package
          path: dist/release

      - name: Publish GitHub release assets
        # softprops/action-gh-release@v2
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            dist/release/module.json
            dist/release/module.zip
            dist/release/package-manifest.json
          prerelease: ${{ contains(needs.package.outputs.version, '-') }}
